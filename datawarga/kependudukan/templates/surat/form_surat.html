{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Buat Surat{% endblock %}
{% block pagetitle %}<i class="bi bi-file-earmark-text text-primary"></i> Buat Surat{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Buat Surat untuk {{ warga.nama_lengkap }}</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-printer"></i> Buat Surat
                            </button>
                            <a href="{% url 'kependudukan:detailWarga' warga.id %}" class="btn btn-secondary">Batal</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
