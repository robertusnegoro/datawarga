{% extends "base.html" %}
{% load static %}
{% block title %}Generate Laporan Daftar Warga{% endblock %}
{% block pagetitle %}Generate Laporan Daftar Warga{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="form-card">
            <div class="form-card-header">
                <i class="bi bi-file-earmark-text"></i>
                <h5>Filter Kriteria Laporan</h5>
            </div>
            <div class="form-card-body">
                <form method="post" enctype="multipart/form-data" id="warga-form" action="{% url 'kependudukan:pdfWargaReport' %}">
                    {% csrf_token %}
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="cluster" class="form-label font-weight-bold text-muted small">CLUSTER</label>
                            <select class="form-select" aria-label="Pilih Cluster" id="cluster" name="cluster">
                                <option value="all">* semua cluster *</option>
                                {% for c in list_cluster %}
                                <option value="{{ c.cluster }}">{{ c.cluster }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="rt" class="form-label font-weight-bold text-muted small">RT</label>
                            <input type="text" class="form-control" id="rt" name="rt" maxlength="150" value="" placeholder="Kosongkan untuk semua RT">
                        </div>
                    </div>
                
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="usia" class="form-label font-weight-bold text-muted small">BATASAN USIA</label>
                            <select class="form-select" aria-label="Pilih Usia" id="usia" name="usia">
                                <option value="all">* semua usia *</option>
                                <option value="lansia">Lansia (> 55 tahun)</option>
                                <option value="balita">Balita (&lt; 5 tahun)</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="status_tinggal" class="form-label font-weight-bold text-muted small">STATUS TINGGAL</label>
                            <select class="form-select" aria-label="Pilih Status" id="status_tinggal" name="status_tinggal">
                                <option value="all">* semua *</option>
                                {% for s in status_tinggal %}
                                <option value="{{ s.0 }}">{{ s.0 }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="file_type" class="form-label font-weight-bold text-muted small">TIPE FILE LAPORAN</label>
                            <select class="form-select" aria-label="Pilih Tipe File" id="file_type" name="file_type">
                                <option value="pdf">PDF Document</option>
                                <option value="sheet">Google Sheet</option>
                            </select>
                        </div>
                        <div class="col-md-6 d-flex align-items-center pt-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="true" id="kepala_keluarga" name="kepala_keluarga">
                                <label class="form-check-label font-weight-bold text-muted small ms-1" for="kepala_keluarga">
                                    KEPALA KELUARGA SAJA
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-4 border-top pt-3">
                        <button type="submit" class="submit-btn">
                            <i class="bi bi-file-earmark-pdf-fill"></i> Generate Laporan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
