{% extends "base.html" %}
{% block title %}Generate Iuran Income Statement{% endblock %}
{% block pagetitle %}Income Statement dari IPL{% endblock %}
{% block content %}
{% load crispy_forms_tags %}
<div class="row">
    <div class="col-lg-6">
        <div class="form-card">
            <div class="form-card-header">
                <i class="bi bi-file-earmark-bar-graph"></i>
                <h5>Generate Income Statement</h5>
            </div>
            <div class="form-card-body">
                <form method="post" enctype="multipart/form-data" id="incomestatement-form"
                    action="{% url 'kependudukan:iuranIncomeStatementReportFormExec' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="periode_tahun" class="form-label font-weight-bold text-muted small">TAHUN</label>
                        <select class="form-select" aria-label="Pilih Tahun" id="periode_tahun" name="periode_tahun">
                            {% for y in range_tahun %}
                            <option value="{{ y }}">{{ y }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="periode_bulan" class="form-label font-weight-bold text-muted small">BULAN</label>
                        <select class="form-select" aria-label="Pilih Bulan" id="periode_bulan" name="periode_bulan">
                            {% for m in range_bulan %}
                            <option value="{{ m }}">{{ m }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="submit-btn w-100">
                            <i class="bi bi-search"></i> Generate
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block jscript %}
<script>

</script>
{% endblock %}
