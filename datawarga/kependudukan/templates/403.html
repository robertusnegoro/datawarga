{% load static %}
<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>DataWarga | Akses Ditolak (403)</title>

        <!-- Preconnect Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

        <link href='{% static "dashboard/css/bootstrap.min.css" %}' rel="stylesheet">
        <link href='{% static "dashboard/dashboard.css" %}?v=3' rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">

        <style>
            :root {
                --error-primary: #e74c3c;
                --error-primary-light: #fadbd8;
                --error-secondary: #c0392b;
                --error-code-color: #f0b4ae;
            }

            body {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Roboto', sans-serif;
                padding: 2rem 1rem;
            }

            .error-card {
                background: rgba(255, 255, 255, 0.07);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 24px;
                padding: 3rem 2.5rem;
                max-width: 560px;
                width: 100%;
                text-align: center;
                box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
                animation: slideUp 0.5s ease-out;
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .error-icon-wrapper {
                width: 100px;
                height: 100px;
                background: rgba(231, 76, 60, 0.15);
                border: 2px solid rgba(231, 76, 60, 0.4);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 1.5rem;
                animation: pulse 2.5s ease-in-out infinite;
            }

            @keyframes pulse {
                0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.3); }
                50% { box-shadow: 0 0 0 16px rgba(231, 76, 60, 0); }
            }

            .error-icon-wrapper i {
                font-size: 2.8rem;
                color: var(--error-primary);
            }

            .error-code {
                font-size: 5rem;
                font-weight: 700;
                color: var(--error-code-color);
                line-height: 1;
                margin-bottom: 0.25rem;
                letter-spacing: -2px;
                text-shadow: 0 2px 20px rgba(231, 76, 60, 0.3);
            }

            .error-title {
                font-size: 1.5rem;
                font-weight: 600;
                color: #ffffff;
                margin-bottom: 0.75rem;
            }

            .error-description {
                color: rgba(255, 255, 255, 0.65);
                font-size: 0.95rem;
                line-height: 1.7;
                margin-bottom: 0.5rem;
            }

            {% if reason %}
            .error-reason-box {
                background: rgba(231, 76, 60, 0.1);
                border: 1px solid rgba(231, 76, 60, 0.25);
                border-radius: 12px;
                padding: 1rem 1.25rem;
                margin: 1.25rem 0;
                color: rgba(255, 255, 255, 0.8);
                font-size: 0.9rem;
                text-align: left;
            }

            .error-reason-box .reason-label {
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--error-code-color);
                font-weight: 600;
                margin-bottom: 0.35rem;
            }
            {% endif %}

            .divider {
                border: none;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                margin: 1.75rem 0;
            }

            .action-buttons {
                display: flex;
                gap: 0.75rem;
                justify-content: center;
                flex-wrap: wrap;
            }

            .btn-go-back {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: #ffffff;
                padding: 0.6rem 1.5rem;
                border-radius: 10px;
                text-decoration: none;
                font-size: 0.9rem;
                font-weight: 500;
                transition: all 0.2s ease;
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
            }

            .btn-go-back:hover {
                background: rgba(255, 255, 255, 0.18);
                border-color: rgba(255, 255, 255, 0.35);
                color: #ffffff;
                transform: translateY(-1px);
            }

            .btn-go-dashboard {
                background: linear-gradient(135deg, #3498db, #2980b9);
                border: none;
                color: #ffffff;
                padding: 0.6rem 1.5rem;
                border-radius: 10px;
                text-decoration: none;
                font-size: 0.9rem;
                font-weight: 500;
                transition: all 0.2s ease;
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            }

            .btn-go-dashboard:hover {
                background: linear-gradient(135deg, #2980b9, #1f618d);
                color: #ffffff;
                transform: translateY(-1px);
                box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
            }

            .app-brand {
                margin-bottom: 2rem;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
            }

            .app-brand i {
                color: #3498db;
                font-size: 1.4rem;
            }

            .app-brand-text {
                font-size: 1.1rem;
                font-weight: 700;
                color: #ffffff;
            }

            .app-brand-text span {
                color: #3498db;
            }
        </style>
    </head>
    <body>
        <div class="error-card">
            <div class="app-brand">
                <i class="bi bi-people-fill"></i>
                <span class="app-brand-text">DATA<span>WARGA</span></span>
            </div>

            <div class="error-icon-wrapper">
                <i class="bi bi-shield-lock-fill"></i>
            </div>

            <div class="error-code">403</div>
            <h1 class="error-title">Akses Ditolak</h1>
            <p class="error-description">
                Anda tidak memiliki izin untuk mengakses halaman atau fitur ini.
                Silakan hubungi administrator sistem jika Anda merasa ini adalah kesalahan.
            </p>

            {% if reason %}
            <div class="error-reason-box">
                <div class="reason-label"><i class="bi bi-info-circle me-1"></i>Alasan</div>
                {{ reason }}
            </div>
            {% endif %}

            <hr class="divider">

            <div class="action-buttons">
                <a href="javascript:history.back()" class="btn-go-back" id="btn-403-back">
                    <i class="bi bi-arrow-left"></i> Kembali
                </a>
                <a href="/" class="btn-go-dashboard" id="btn-403-dashboard">
                    <i class="bi bi-house-door"></i> Ke Dashboard
                </a>
            </div>
        </div>

        <script src='{% static "dashboard/js/bootstrap.bundle.min.js" %}' crossorigin="anonymous"></script>
    </body>
</html>
